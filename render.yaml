services:
  - type: web
    name: mvp-backend
    env: docker
    repo: https://github.com/nofuxgvnwiring-source/MVP
    branch: main
    dockerfilePath: backend/Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BINANCE_SYMBOL
        sync: false
      - key: FREE_SIGNAL_DELAY_SECONDS
        sync: false
    healthCheckPath: /health
    plan: free
